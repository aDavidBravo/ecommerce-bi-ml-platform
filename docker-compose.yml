version: '3.8'

services:
  # ==========================================
  # DATABASES
  # ==========================================
  
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: dataengineer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - data_platform

  mongodb:
    image: mongo:6.0
    container_name: ecommerce-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ecommerce
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - data_platform

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - data_platform

  # ==========================================
  # APACHE SPARK CLUSTER
  # ==========================================
  
  spark-master:
    image: bitnami/spark:3.4
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./src/scala:/opt/spark-apps
      - ./data:/opt/spark-data
    networks:
      - data_platform

  spark-worker-1:
    image: bitnami/spark:3.4
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - data_platform

  spark-worker-2:
    image: bitnami/spark:3.4
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - data_platform

  # ==========================================
  # APACHE KAFKA
  # ==========================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - data_platform

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data_platform

  # ==========================================
  # AIRFLOW
  # ==========================================
  
  airflow-init:
    image: apache/airflow:2.6.3-python3.9
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dataengineer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./pipelines/airflow/logs:/opt/airflow/logs
      - ./pipelines/airflow/plugins:/opt/airflow/plugins
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    networks:
      - data_platform

  airflow-webserver:
    image: apache/airflow:2.6.3-python3.9
    container_name: airflow-webserver
    depends_on:
      - airflow-init
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dataengineer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    ports:
      - "8081:8080"
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./pipelines/airflow/logs:/opt/airflow/logs
      - ./pipelines/airflow/plugins:/opt/airflow/plugins
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - data_platform

  airflow-scheduler:
    image: apache/airflow:2.6.3-python3.9
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dataengineer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./pipelines/airflow/logs:/opt/airflow/logs
      - ./pipelines/airflow/plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - data_platform

  # ==========================================
  # MLFLOW
  # ==========================================
  
  mlflow:
    build:
      context: ./infrastructure/docker
      dockerfile: Dockerfile.mlflow
    container_name: mlflow-server
    depends_on:
      - postgres
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://dataengineer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://dataengineer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - data_platform

  # ==========================================
  # JUPYTER LAB
  # ==========================================
  
  jupyter:
    build:
      context: ./infrastructure/docker
      dockerfile: Dockerfile.jupyter
    container_name: jupyter-lab
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    networks:
      - data_platform

  # ==========================================
  # STREAMLIT DASHBOARD
  # ==========================================
  
  streamlit:
    build:
      context: ./infrastructure/docker
      dockerfile: Dockerfile.streamlit
    container_name: streamlit-dashboard
    depends_on:
      - postgres
      - mlflow
    ports:
      - "8501:8501"
    volumes:
      - ./dashboards/streamlit:/app
      - ./src:/app/src
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=ecommerce_db
      - POSTGRES_USER=dataengineer
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    networks:
      - data_platform

  # ==========================================
  # MONITORING - PROMETHEUS
  # ==========================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - data_platform

  # ==========================================
  # MONITORING - GRAFANA
  # ==========================================
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - data_platform

  # ==========================================
  # METABASE - BI TOOL
  # ==========================================
  
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    depends_on:
      - postgres
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: dataengineer
      MB_DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    networks:
      - data_platform

  # ==========================================
  # NGINX - REVERSE PROXY
  # ==========================================
  
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - streamlit
      - mlflow
      - airflow-webserver
    networks:
      - data_platform

networks:
  data_platform:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  metabase_data:
